<!DOCTYPE html>
<html>
<head>
    <title>CityEngine 3D Viewer + Interactive Map</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #0a0a1a; font-family: 'Inter', 'Segoe UI', sans-serif; }

        #container { display: flex; width: 100vw; height: 100vh; }

        /* ── Viewer Panel ── */
        #viewer-panel { flex: 1; position: relative; overflow: hidden; }

        /* ── Toolbar ── */
        #toolbar {
            position: absolute; top: 16px; left: 16px; z-index: 10;
            display: flex; flex-direction: column; gap: 8px;
        }
        #status {
            background: rgba(10, 10, 26, 0.9);
            backdrop-filter: blur(12px);
            color: #00e676;
            padding: 12px 16px; border-radius: 10px;
            font-family: 'Cascadia Code', Consolas, monospace; font-size: 12px;
            min-width: 280px;
            border: 1px solid rgba(0, 230, 118, 0.2);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        .btn {
            background: rgba(99, 102, 241, 0.85);
            backdrop-filter: blur(8px);
            color: white; border: none;
            padding: 10px 18px; border-radius: 8px; cursor: pointer;
            font-weight: 600; font-size: 12px; font-family: 'Inter', sans-serif;
            box-shadow: 0 2px 12px rgba(99, 102, 241, 0.3);
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .btn:hover { background: rgba(79, 82, 221, 0.95); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(99, 102, 241, 0.4); }
        .btn:active { transform: translateY(0); }
        .btn.secondary { background: rgba(55, 65, 81, 0.85); box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
        .btn.secondary:hover { background: rgba(75, 85, 99, 0.95); }

        /* ── Info Bar ── */
        #info-bar {
            position: absolute; bottom: 12px; left: 12px; z-index: 10;
            background: rgba(10, 10, 26, 0.75);
            backdrop-filter: blur(8px);
            color: #94a3b8; padding: 8px 14px;
            border-radius: 8px; font-size: 11px;
            font-family: 'Cascadia Code', Consolas, monospace;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* ── Loading Overlay ── */
        #loading-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(10, 10, 26, 0.92);
            backdrop-filter: blur(20px);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 100; transition: opacity 0.5s ease;
        }
        #loading-overlay.hidden { opacity: 0; pointer-events: none; }
        .loader-spinner {
            width: 48px; height: 48px;
            border: 3px solid rgba(99, 102, 241, 0.15);
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-text {
            color: #e2e8f0; font-size: 14px; font-weight: 500;
            margin-top: 16px; letter-spacing: 0.02em;
        }
        .loader-sub {
            color: #64748b; font-size: 12px; margin-top: 6px;
        }

        /* ── Map Panel ── */
        #map-panel {
            width: 380px; position: relative;
            border-left: 1px solid rgba(99, 102, 241, 0.3);
            transition: width 0.3s ease, opacity 0.3s ease;
        }
        #map-panel.collapsed { width: 0; opacity: 0; overflow: hidden; border: none; }
        #map { width: 100%; height: 100%; }
        #map-header {
            position: absolute; top: 0; left: 0; right: 0; z-index: 1000;
            background: linear-gradient(180deg, rgba(99, 102, 241, 0.92), rgba(99, 102, 241, 0.78));
            backdrop-filter: blur(8px);
            color: white; padding: 12px 16px; font-weight: 600; font-size: 13px;
            text-align: center; letter-spacing: 0.02em;
        }

        /* ── Toggle Map Button ── */
        #toggle-map {
            position: absolute; top: 50%; right: 0; transform: translateY(-50%);
            z-index: 1000;
            background: rgba(99, 102, 241, 0.9);
            backdrop-filter: blur(8px);
            color: white; border: none;
            padding: 18px 8px; cursor: pointer; font-size: 15px;
            border-radius: 8px 0 0 8px;
            box-shadow: -2px 0 12px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.1);
            border-right: none;
        }
        #toggle-map:hover { background: rgba(79, 82, 221, 0.95); padding-right: 12px; }

        /* ── Animation Badge ── */
        #anim-badge {
            position: absolute; top: 16px; right: 16px; z-index: 10;
            background: rgba(16, 185, 129, 0.85);
            backdrop-filter: blur(8px);
            color: white; padding: 8px 14px; border-radius: 20px;
            font-size: 11px; font-weight: 600;
            display: none;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 2px 12px rgba(16, 185, 129, 0.3);
        }
        #anim-badge.visible { display: flex; align-items: center; gap: 6px; }
    </style>
</head>
<body>
    <div id="container">
        <div id="viewer-panel">
            <!-- Loading Overlay -->
            <div id="loading-overlay">
                <div class="loader-spinner"></div>
                <div class="loader-text">Loading 3D Model...</div>
                <div class="loader-sub" id="load-progress">Initializing viewer</div>
            </div>

            <!-- Toolbar -->
            <div id="toolbar">
                <div id="status">⏳ Initializing...</div>
                <button class="btn" onclick="resetCamera()">🎯 Focus Building</button>
                <button class="btn secondary" onclick="toggleWireframe()">📐 Wireframe</button>
                <button class="btn secondary" onclick="toggleAutoRotate()">🔄 Auto Rotate</button>
                <button class="btn secondary" onclick="toggleGrid()">🔲 Grid</button>
            </div>

            <!-- Animation Badge -->
            <div id="anim-badge">▶ Animations Playing</div>

            <!-- Info Bar -->
            <div id="info-bar">Left = Rotate · Scroll = Zoom · Right = Pan</div>

            <!-- Toggle Map -->
            <button id="toggle-map" onclick="toggleMapPanel()">🗺</button>
        </div>

        <!-- Map Panel -->
        <div id="map-panel">
            <div id="map-header">🗺 Interactive Map</div>
            <div id="map"></div>
        </div>
    </div>

    <!-- Leaflet Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
    <script>
    // ── Map Setup ──
    var mapObj = L.map("map", { zoomControl: true }).setView([15, 45], 16);
    var sat = L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", { attribution: "Esri" });
    var osm = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { attribution: "OSM" });
    sat.addTo(mapObj);
    L.control.layers({ "Satellite": sat, "OpenStreetMap": osm }).addTo(mapObj);

    var drawnItems = new L.FeatureGroup();
    mapObj.addLayer(drawnItems);
    mapObj.addControl(new L.Control.Draw({
        draw: {
            polygon: { shapeOptions: { color: "#6366f1", weight: 3 } },
            rectangle: { shapeOptions: { color: "#6366f1", weight: 3 } },
            polyline: { shapeOptions: { color: "#10b981", weight: 3 } },
            circle: false, circlemarker: false, marker: true
        },
        edit: { featureGroup: drawnItems }
    }));
    mapObj.on(L.Draw.Event.CREATED, function (e) { drawnItems.addLayer(e.layer); });

    var mapVisible = true;
    window.toggleMapPanel = function () {
        var p = document.getElementById("map-panel");
        mapVisible = !mapVisible;
        if (mapVisible) {
            p.classList.remove("collapsed");
        } else {
            p.classList.add("collapsed");
        }
        document.getElementById("toggle-map").textContent = mapVisible ? "🗺" : "📍";
        if (mapVisible) setTimeout(function () { mapObj.invalidateSize(); }, 350);
        window.dispatchEvent(new Event("resize"));
    };
    </script>

    try {
        var bin = atob(b64);
        var bytes = new Uint8Array(bin.length);
        for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
        var blob = new Blob([bytes.buffer], { type: "model/gltf-binary" });
        var url = URL.createObjectURL(blob);

        document.getElementById("load-progress").textContent = "Loading 3D geometry...";
        log("🔧 Loading GLB model...");

        gltfLoader.load(url, function (gltf) {
            loadedModel = gltf.scene;

            loadedModel.traverse(function (child) {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                    if (child.material) {
                        child.material.side = THREE.DoubleSide;
                    }
                }
            });

            scene.add(loadedModel);

            // ── Animation Support ──
            if (gltf.animations && gltf.animations.length > 0) {
                mixer = new THREE.AnimationMixer(loadedModel);
                gltf.animations.forEach(function (clip) {
                    mixer.clipAction(clip).play();
                });
                document.getElementById("anim-badge").classList.add("visible");
                log("▶ " + gltf.animations.length + " animation(s) playing");
            }

            // ── Camera Fit ──
            var box = new THREE.Box3().setFromObject(loadedModel);
            var center = box.getCenter(new THREE.Vector3());
            var size = box.getSize(new THREE.Vector3());
            var maxDim = Math.max(size.x, size.y, size.z);

            camera.position.set(center.x + maxDim, center.y + maxDim * 0.7, center.z + maxDim);
            controls.target.copy(center);
            controls.update();

            ground.position.y = box.min.y;
            gridHelper.position.y = box.min.y + 0.1;

            // Hide loading overlay
            document.getElementById("loading-overlay").classList.add("hidden");

            log('✅ <span style="color:#10b981">Building Ready!</span> ' +
                size.x.toFixed(0) + "×" + size.y.toFixed(0) + "×" + size.z.toFixed(0) + " m" +
                (gltf.animations.length > 0 ? " · " + gltf.animations.length + " anim" : ""));

            URL.revokeObjectURL(url);

        }, function (progress) {
            if (progress.total > 0) {
                var pct = Math.round(progress.loaded / progress.total * 100);
                document.getElementById("load-progress").textContent = "Loading... " + pct + "%";
            }
        }, function (err) {
            document.getElementById("loading-overlay").classList.add("hidden");
            log("❌ Load Error: " + err.message);
            console.error(err);
        });

    } catch (e) {
        document.getElementById("loading-overlay").classList.add("hidden");
        log("❌ Decode Error: " + e.message);
        console.error(e);
    }

    // ── Controls ──
    window.resetCamera = function () {
        if (!loadedModel) return;
        var box = new THREE.Box3().setFromObject(loadedModel);
        var c = box.getCenter(new THREE.Vector3());
        var s = box.getSize(new THREE.Vector3());
        var m = Math.max(s.x, s.y, s.z);
        camera.position.set(c.x + m, c.y + m * 0.7, c.z + m);
        controls.target.copy(c);
        controls.update();
        log("🎯 Focused on building");
    };

    window.toggleWireframe = function () {
        wireframeMode = !wireframeMode;
        if (loadedModel) loadedModel.traverse(function (c) {
            if (c.isMesh && c.material) c.material.wireframe = wireframeMode;
        });
        log(wireframeMode ? "📐 Wireframe ON" : "📐 Wireframe OFF");
    };

    window.toggleAutoRotate = function () {
        controls.autoRotate = !controls.autoRotate;
        controls.autoRotateSpeed = 2.0;
        log(controls.autoRotate ? "🔄 Auto-rotate ON" : "🔄 Auto-rotate OFF");
    };

    window.toggleGrid = function () {
        gridVisible = !gridVisible;
        gridHelper.visible = gridVisible;
        log(gridVisible ? "🔲 Grid ON" : "🔲 Grid OFF");
    };

    // ── Resize ──
    window.addEventListener("resize", function () {
        var w = viewerPanel.clientWidth, h = viewerPanel.clientHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
    });

    // ── Render Loop ──
    (function animate() {
        requestAnimationFrame(animate);
        var delta = clock.getDelta();
        if (mixer) mixer.update(delta);
        controls.update();
        renderer.render(scene, camera);
    })();
