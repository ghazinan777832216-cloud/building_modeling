<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, minimum-scale=1.0, initial-scale=1, user-scalable=no" />
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://developer.api.autodesk.com/modelderivative/v2/viewers/7.98/style.min.css" type="text/css">
    
    <script src="https://developer.api.autodesk.com/modelderivative/v2/viewers/7.98/viewer3D.min.js"></script>
    <script src="https://developer.api.autodesk.com/modelderivative/v2/viewers/7.98/extensions/glTF/glTF.min.js"></script>
    
    <style>
        body { margin: 0; }
        #viewer { width: 100%; height: 100vh; position: relative; }
    </style>
</head>
<body>
    <div id="viewer"></div>
    <script>
        var viewer;
        var options = {
            env: 'Local'
        };

        Autodesk.Viewing.Initializer(options, function() {
            var htmlDiv = document.getElementById('viewer');
            viewer = new Autodesk.Viewing.GuiViewer3D(htmlDiv, { extensions: ['Autodesk.glTF'] });
            viewer.start();

            viewer.loadExtension('Autodesk.glTF').then(() => {
                viewer.setTheme('dark-theme');
                viewer.loadModel("test2.glb", { fileExt: 'glb', modelName: 'test2.glb' }, () => {
                    console.log("Model loaded");
                    viewer.setLightPreset(0);
                    // Add some lights manually
                    var ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
                    var dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
                    dirLight.position.set(100, 200, 100).normalize();
                    viewer.impl.scene.add(ambientLight);
                    viewer.impl.scene.add(dirLight);
                    viewer.impl.sceneUpdated(true);
                });
            });
        });
    </script>
</body>
</html>
